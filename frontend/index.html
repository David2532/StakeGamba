<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Golden Goal Rush Prototype</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #07100d;
        --panel: rgba(8, 15, 14, 0.78);
        --panel-strong: rgba(5, 9, 10, 0.92);
        --line: rgba(255, 255, 255, 0.12);
        --gold: #ffd66b;
        --gold-strong: #ffb72c;
        --green: #21f59b;
        --green-soft: rgba(33, 245, 155, 0.22);
        --red: #ff4d66;
        --blue: #4cc3ff;
        --text: #f7fff8;
        --muted: #96aaa2;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        min-height: 100dvh;
        overflow: hidden;
        overflow-x: hidden;
        background:
          radial-gradient(circle at 50% 0%, rgba(255, 214, 107, 0.15), transparent 34%),
          linear-gradient(180deg, rgba(13, 28, 23, 0.88), rgba(4, 8, 9, 0.98)),
          var(--bg);
        color: var(--text);
      }

      body::before {
        content: "";
        position: fixed;
        inset: 0;
        pointer-events: none;
        background:
          linear-gradient(90deg, transparent 0 8%, rgba(33, 245, 155, 0.08) 8.3% 8.8%, transparent 9.2%),
          repeating-linear-gradient(90deg, rgba(255, 255, 255, 0.035) 0 1px, transparent 1px 72px);
        mask-image: linear-gradient(180deg, transparent, #000 18%, #000 76%, transparent);
        opacity: 0.55;
      }

      button,
      select,
      input {
        font: inherit;
      }

      button {
        border: 0;
        color: var(--text);
        cursor: pointer;
      }

      button:disabled {
        cursor: wait;
        opacity: 0.56;
      }

      .app {
        position: relative;
        display: grid;
        grid-template-rows: auto 1fr;
        width: 100%;
        max-width: 100dvw;
        height: 100vh;
        height: 100dvh;
        padding: 14px;
        gap: 12px;
      }

      .topbar {
        display: grid;
        grid-template-columns: 1fr auto;
        align-items: center;
        gap: 12px;
        min-height: 58px;
        padding: 10px 14px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: linear-gradient(180deg, rgba(11, 22, 20, 0.92), rgba(4, 7, 8, 0.82));
        box-shadow: 0 16px 44px rgba(0, 0, 0, 0.35);
      }

      .brand {
        display: flex;
        align-items: center;
        gap: 12px;
        min-width: 0;
      }

      .crest {
        display: grid;
        place-items: center;
        flex: 0 0 38px;
        width: 38px;
        height: 38px;
        border: 1px solid rgba(255, 214, 107, 0.55);
        border-radius: 8px;
        background: radial-gradient(circle at 50% 35%, #fff1a9, #e6a81f 48%, #6b4507 100%);
        color: #111;
        font-weight: 1000;
        letter-spacing: 0;
      }

      h1 {
        margin: 0;
        font-size: clamp(20px, 3vw, 34px);
        line-height: 1;
        letter-spacing: 0;
      }

      .subline {
        margin-top: 5px;
        color: var(--muted);
        font-size: 12px;
        letter-spacing: 0;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .header-actions {
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .icon-btn {
        display: grid;
        place-items: center;
        width: 38px;
        height: 38px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.06);
        font-weight: 900;
      }

      .layout {
        display: grid;
        grid-template-columns: minmax(0, 1fr) 330px;
        gap: 12px;
        min-height: 0;
      }

      .stage {
        position: relative;
        grid-column: 1;
        min-width: 0;
        min-height: 0;
        overflow: hidden;
        border: 1px solid var(--line);
        border-radius: 8px;
        background:
          radial-gradient(circle at 50% 0%, rgba(33, 245, 155, 0.12), transparent 36%),
          linear-gradient(180deg, rgba(4, 13, 13, 0.96), rgba(1, 3, 5, 0.92));
        box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.06), 0 24px 70px rgba(0, 0, 0, 0.42);
      }

      #game-host {
        width: 100%;
        height: 100%;
      }

      .win-toast {
        position: absolute;
        left: 50%;
        top: 11%;
        z-index: 4;
        transform: translate(-50%, -20px) scale(0.94);
        min-width: min(520px, calc(100% - 32px));
        padding: 14px 22px;
        border: 1px solid rgba(255, 214, 107, 0.58);
        border-radius: 8px;
        background: rgba(8, 9, 8, 0.82);
        box-shadow: 0 0 50px rgba(255, 183, 44, 0.26);
        text-align: center;
        opacity: 0;
        pointer-events: none;
        transition:
          opacity 160ms ease,
          transform 160ms ease;
      }

      .win-toast.show {
        opacity: 1;
        transform: translate(-50%, 0) scale(1);
      }

      .win-toast strong {
        display: block;
        color: var(--gold);
        font-size: clamp(22px, 4vw, 44px);
        line-height: 1;
        letter-spacing: 0;
        text-shadow: 0 0 24px rgba(255, 214, 107, 0.46);
      }

      .win-toast span {
        display: block;
        margin-top: 8px;
        color: #d8f8ea;
        font-size: 14px;
      }

      .side-panel {
        grid-column: 2;
        display: flex;
        flex-direction: column;
        min-height: 0;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--panel);
        backdrop-filter: blur(16px);
        overflow: hidden;
      }

      .meters {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 8px;
        padding: 12px;
        border-bottom: 1px solid var(--line);
      }

      .meter {
        min-width: 0;
        padding: 10px;
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.045);
      }

      .meter label {
        display: block;
        color: var(--muted);
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 0;
      }

      .meter strong {
        display: block;
        margin-top: 4px;
        font-size: 20px;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .meter.full {
        grid-column: 1 / -1;
      }

      .controls {
        display: grid;
        gap: 10px;
        padding: 12px;
      }

      .field {
        display: grid;
        gap: 6px;
      }

      .field label {
        color: var(--muted);
        font-size: 12px;
        text-transform: uppercase;
        letter-spacing: 0;
      }

      .stepper {
        display: grid;
        grid-template-columns: 42px 1fr 42px;
        gap: 8px;
      }

      .stepper input,
      select {
        width: 100%;
        min-height: 42px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: rgba(0, 0, 0, 0.34);
        color: var(--text);
        text-align: center;
        outline: none;
      }

      .stepper button,
      .secondary,
      .toggle {
        min-height: 42px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.06);
      }

      .primary-spin {
        min-height: 74px;
        border-radius: 8px;
        background: radial-gradient(circle at 50% 20%, #fff8bf, var(--gold-strong) 42%, #895808 100%);
        color: #130f04;
        font-size: 24px;
        font-weight: 1000;
        letter-spacing: 0;
        box-shadow: 0 0 38px rgba(255, 183, 44, 0.24);
      }

      .quick-row,
      .modal-row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 8px;
      }

      .toggle.active {
        border-color: rgba(33, 245, 155, 0.75);
        background: var(--green-soft);
        color: #dffff1;
      }

      .buy-panel {
        display: grid;
        gap: 8px;
        padding: 12px;
        border-top: 1px solid var(--line);
        overflow: auto;
      }

      .buy-panel h2 {
        margin: 0 0 2px;
        font-size: 14px;
        text-transform: uppercase;
        letter-spacing: 0;
      }

      .buy-option {
        display: grid;
        grid-template-columns: 1fr auto;
        align-items: center;
        gap: 8px;
        width: 100%;
        padding: 10px;
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 8px;
        background: rgba(0, 0, 0, 0.22);
        text-align: left;
      }

      .buy-option span {
        color: var(--muted);
        font-size: 12px;
      }

      .buy-option b {
        color: var(--gold);
      }

      dialog {
        width: min(760px, calc(100dvw - 24px));
        max-height: min(760px, calc(100dvh - 24px));
        border: 1px solid rgba(255, 214, 107, 0.34);
        border-radius: 8px;
        background: var(--panel-strong);
        color: var(--text);
        box-shadow: 0 24px 80px rgba(0, 0, 0, 0.7);
      }

      dialog::backdrop {
        background: rgba(0, 0, 0, 0.62);
        backdrop-filter: blur(5px);
      }

      .dialog-body {
        display: grid;
        gap: 14px;
        padding: 18px;
      }

      .dialog-body h2 {
        margin: 0;
      }

      .dialog-body p,
      .dialog-body li {
        color: #c7d8d2;
        line-height: 1.45;
      }

      .pay-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
        gap: 8px;
      }

      .pay-card {
        padding: 10px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.04);
      }

      .pay-card b {
        display: block;
        color: var(--gold);
      }

      .confetti {
        position: fixed;
        inset: 0;
        pointer-events: none;
        overflow: hidden;
        z-index: 8;
      }

      .confetti i {
        position: absolute;
        top: -18px;
        width: 8px;
        height: 14px;
        border-radius: 2px;
        animation: fall 900ms linear forwards;
      }

      @keyframes fall {
        to {
          transform: translateY(110dvh) rotate(520deg);
          opacity: 0;
        }
      }

      @media (max-width: 900px) {
        body {
          overflow: auto;
          overflow-x: hidden;
        }

        .app {
          min-height: 100vh;
          min-height: 100dvh;
          height: auto;
          padding: 8px;
        }

        .topbar {
          grid-template-columns: 1fr;
        }

        .header-actions {
          justify-content: space-between;
        }

        .layout {
          grid-template-columns: 1fr;
          grid-template-rows: minmax(460px, 62vh) auto;
        }

        .stage,
        .side-panel {
          grid-column: 1;
        }

        .stage {
          grid-row: 1;
        }

        .side-panel {
          grid-row: 2;
          min-height: auto;
        }

        .buy-panel {
          max-height: none;
        }
      }

      @media (max-width: 520px) {
        .app {
          gap: 8px;
        }

        .topbar {
          padding: 10px;
        }

        .layout {
          grid-template-rows: minmax(410px, 58vh) auto;
        }

        .meters {
          grid-template-columns: 1fr 1fr;
          padding: 8px;
        }

        .controls,
        .buy-panel {
          padding: 8px;
        }

        .primary-spin {
          min-height: 64px;
        }
      }

      .stage::before,
      .stage::after {
        content: "";
        position: absolute;
        inset: 0;
        pointer-events: none;
        z-index: 1;
      }

      .stage::before {
        background:
          conic-gradient(from 212deg at 10% 8%, rgba(255, 255, 255, 0.24), transparent 11%, transparent 100%),
          conic-gradient(from 148deg at 90% 8%, rgba(255, 255, 255, 0.22), transparent 12%, transparent 100%),
          linear-gradient(90deg, transparent, rgba(33, 245, 155, 0.08), transparent);
        mix-blend-mode: screen;
        opacity: 0.58;
        animation: stadiumSweep 7.5s ease-in-out infinite alternate;
      }

      .stage::after {
        background:
          radial-gradient(circle at 18% 20%, rgba(255, 214, 107, 0.2), transparent 4%),
          radial-gradient(circle at 72% 16%, rgba(33, 245, 155, 0.16), transparent 5%),
          repeating-linear-gradient(180deg, transparent 0 46px, rgba(255, 214, 107, 0.06) 47px 49px, transparent 50px);
        opacity: 0.42;
        animation: ledPulse 2.8s ease-in-out infinite;
      }

      #game-host {
        position: relative;
        z-index: 2;
      }

      .topbar,
      .side-panel,
      .stage {
        border-color: rgba(255, 214, 107, 0.18);
        box-shadow:
          inset 0 1px 0 rgba(255, 255, 255, 0.08),
          0 22px 80px rgba(0, 0, 0, 0.54),
          0 0 34px rgba(33, 245, 155, 0.06);
      }

      .topbar {
        background:
          linear-gradient(180deg, rgba(17, 31, 28, 0.9), rgba(3, 7, 8, 0.86)),
          linear-gradient(90deg, rgba(255, 214, 107, 0.1), transparent 38%, rgba(33, 245, 155, 0.08));
      }

      h1 {
        color: #fff9d8;
        text-shadow: 0 0 22px rgba(255, 214, 107, 0.28), 0 2px 0 #2a1c05;
      }

      .side-panel {
        background:
          linear-gradient(180deg, rgba(13, 24, 22, 0.82), rgba(3, 8, 9, 0.94)),
          radial-gradient(circle at 50% 0%, rgba(255, 214, 107, 0.14), transparent 36%);
      }

      .meter {
        position: relative;
        overflow: hidden;
        background:
          linear-gradient(180deg, rgba(255, 255, 255, 0.07), rgba(255, 255, 255, 0.025)),
          radial-gradient(circle at 100% 0%, rgba(33, 245, 155, 0.1), transparent 38%);
        transition: transform 150ms ease, border-color 150ms ease, box-shadow 150ms ease;
      }

      .meter::before {
        content: "";
        position: absolute;
        inset: 0;
        background: linear-gradient(110deg, transparent 0 34%, rgba(255, 255, 255, 0.07) 46%, transparent 60%);
        transform: translateX(-110%);
        animation: panelSheen 6s ease-in-out infinite;
      }

      .meter label::before {
        display: inline-block;
        width: 18px;
        margin-right: 4px;
        color: var(--gold);
      }

      .meter:nth-child(1) label::before {
        content: "$";
      }

      .meter:nth-child(2) label::before {
        content: "*";
      }

      .meter:nth-child(3) label::before {
        content: "x";
      }

      .meter:nth-child(4) label::before {
        content: ">";
      }

      .meter.full label::before {
        content: ".";
      }

      #statusValue[data-state="ready"] {
        color: var(--green);
      }

      #statusValue[data-state="spinning"] {
        color: var(--gold);
      }

      #statusValue[data-state="bonus"] {
        color: #ffe9a6;
        text-shadow: 0 0 18px rgba(255, 214, 107, 0.36);
      }

      #statusValue[data-state="complete"] {
        color: #e9fff5;
      }

      #statusValue[data-state="error"] {
        color: var(--red);
      }

      .primary-spin {
        position: relative;
        overflow: hidden;
        border: 1px solid rgba(255, 244, 186, 0.42);
        background:
          radial-gradient(circle at 50% 18%, #fff6c3 0 12%, #ffd66b 35%, #e28d15 68%, #663905 100%);
        text-shadow: 0 1px 0 rgba(255, 255, 255, 0.42);
        transition: transform 120ms ease, filter 150ms ease, box-shadow 150ms ease;
        animation: spinReadyPulse 1.7s ease-in-out infinite;
      }

      .primary-spin::before {
        content: "";
        position: absolute;
        inset: -40%;
        background: conic-gradient(from 0deg, transparent, rgba(255, 255, 255, 0.32), transparent 32%);
        animation: buttonSweep 2.5s linear infinite;
      }

      .primary-spin:hover {
        filter: brightness(1.08);
        box-shadow: 0 0 44px rgba(255, 183, 44, 0.36), 0 12px 34px rgba(0, 0, 0, 0.38);
      }

      .primary-spin:active {
        transform: scale(0.98);
      }

      .primary-spin.is-spinning {
        animation: spinLoading 0.8s linear infinite;
        color: rgba(19, 15, 4, 0.74);
      }

      .buy-option {
        position: relative;
        overflow: hidden;
        min-height: 66px;
        border-color: rgba(255, 214, 107, 0.12);
        background:
          linear-gradient(180deg, rgba(255, 255, 255, 0.055), rgba(255, 255, 255, 0.018)),
          radial-gradient(circle at 0% 0%, rgba(33, 245, 155, 0.1), transparent 42%);
        transition: transform 150ms ease, border-color 150ms ease, box-shadow 150ms ease, background 150ms ease;
      }

      .buy-option::after {
        content: "";
        position: absolute;
        inset: 0;
        background: linear-gradient(100deg, transparent 20%, rgba(255, 214, 107, 0.08), transparent 72%);
        transform: translateX(-120%);
        transition: transform 320ms ease;
      }

      .buy-option:not(:disabled):hover {
        transform: translateY(-1px);
        border-color: rgba(255, 214, 107, 0.44);
        box-shadow: 0 10px 28px rgba(0, 0, 0, 0.32), 0 0 24px rgba(33, 245, 155, 0.08);
      }

      .buy-option:not(:disabled):hover::after {
        transform: translateX(90%);
      }

      .buy-option.locked {
        border-color: rgba(255, 214, 107, 0.26);
        background:
          linear-gradient(180deg, rgba(64, 46, 9, 0.42), rgba(10, 9, 7, 0.32)),
          repeating-linear-gradient(135deg, rgba(255, 214, 107, 0.06) 0 8px, transparent 8px 16px);
      }

      input[type="range"] {
        width: 100%;
        accent-color: var(--gold);
        height: 6px;
        border-radius: 999px;
        background: linear-gradient(90deg, var(--gold), rgba(255, 255, 255, 0.18));
      }

      input[type="range"]::-webkit-slider-thumb {
        width: 18px;
        height: 18px;
        border: 2px solid #fff5c4;
        border-radius: 50%;
        background: var(--gold);
        box-shadow: 0 0 18px rgba(245, 200, 75, 0.42);
        appearance: none;
      }

      select {
        appearance: none;
        background:
          linear-gradient(45deg, transparent 50%, var(--gold) 50%) calc(100% - 18px) 52% / 7px 7px no-repeat,
          linear-gradient(135deg, var(--gold) 50%, transparent 50%) calc(100% - 13px) 52% / 7px 7px no-repeat,
          rgba(0, 0, 0, 0.34);
        padding: 0 34px 0 12px;
      }

      .cascade-badge {
        position: absolute;
        left: 50%;
        top: 78px;
        z-index: 5;
        transform: translate(-50%, -12px) scale(0.92);
        padding: 8px 16px;
        border: 1px solid rgba(33, 245, 155, 0.52);
        border-radius: 999px;
        background: rgba(4, 10, 9, 0.84);
        color: #ceffe8;
        font-weight: 900;
        letter-spacing: 0;
        opacity: 0;
        pointer-events: none;
        box-shadow: 0 0 28px rgba(33, 245, 155, 0.22);
        transition: opacity 160ms ease, transform 160ms ease;
      }

      .cascade-badge.show {
        opacity: 1;
        transform: translate(-50%, 0) scale(1);
      }

      .big-win-overlay,
      .bonus-transition {
        position: fixed;
        inset: 0;
        z-index: 20;
        display: grid;
        place-items: center;
        padding: 24px;
        background:
          radial-gradient(circle at 50% 38%, rgba(255, 214, 107, 0.2), transparent 30%),
          rgba(0, 0, 0, 0.66);
        opacity: 0;
        pointer-events: none;
        transition: opacity 180ms ease;
      }

      .big-win-overlay.show,
      .bonus-transition.show {
        opacity: 1;
        pointer-events: auto;
      }

      .big-win-card,
      .bonus-card {
        width: min(680px, 92vw);
        border: 1px solid rgba(255, 214, 107, 0.5);
        border-radius: 8px;
        padding: clamp(22px, 5vw, 46px);
        background:
          linear-gradient(180deg, rgba(19, 20, 13, 0.92), rgba(4, 7, 7, 0.96)),
          radial-gradient(circle at 50% 0%, rgba(255, 214, 107, 0.24), transparent 40%);
        box-shadow: 0 0 70px rgba(255, 183, 44, 0.22), 0 34px 90px rgba(0, 0, 0, 0.72);
        text-align: center;
      }

      .big-win-title,
      .bonus-title {
        margin: 0;
        color: var(--gold);
        font-size: clamp(34px, 9vw, 82px);
        line-height: 0.95;
        letter-spacing: 0;
        text-shadow: 0 0 26px rgba(255, 214, 107, 0.42), 0 4px 0 #442904;
      }

      .big-win-amount {
        margin-top: 16px;
        color: #ffffff;
        font-size: clamp(26px, 6vw, 54px);
        font-weight: 1000;
        text-shadow: 0 0 20px rgba(33, 245, 155, 0.32);
      }

      .big-win-sub,
      .bonus-sub {
        margin-top: 12px;
        color: #c9f5e3;
      }

      .big-win-bar {
        height: 6px;
        margin-top: 22px;
        overflow: hidden;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.1);
      }

      .big-win-bar span {
        display: block;
        width: 0%;
        height: 100%;
        background: linear-gradient(90deg, var(--green), var(--gold));
        box-shadow: 0 0 18px rgba(255, 214, 107, 0.5);
      }

      .light-sweep {
        position: absolute;
        inset: 0;
        z-index: 6;
        pointer-events: none;
        background: linear-gradient(100deg, transparent 0 36%, rgba(255, 255, 255, 0.46) 48%, rgba(255, 214, 107, 0.34) 52%, transparent 66%);
        transform: translateX(-120%);
        opacity: 0;
      }

      .light-sweep.show {
        animation: gridLightSweep 720ms ease-out forwards;
      }

      @keyframes stadiumSweep {
        from {
          transform: translateX(-1%) scale(1);
          opacity: 0.44;
        }
        to {
          transform: translateX(1%) scale(1.02);
          opacity: 0.72;
        }
      }

      @keyframes ledPulse {
        50% {
          opacity: 0.64;
        }
      }

      @keyframes panelSheen {
        0%,
        68% {
          transform: translateX(-120%);
        }
        100% {
          transform: translateX(130%);
        }
      }

      @keyframes spinReadyPulse {
        50% {
          box-shadow: 0 0 42px rgba(255, 183, 44, 0.32);
        }
      }

      @keyframes buttonSweep {
        to {
          transform: rotate(360deg);
        }
      }

      @keyframes spinLoading {
        to {
          filter: hue-rotate(18deg) brightness(1.08);
        }
      }

      @media (max-width: 900px) {

      @media (prefers-reduced-motion: reduce) {

    <script type="module">
      import * as Phaser from "./node_modules/phaser/dist/phaser.esm.js";

      import { REEL_TIMING, durationFor, reelStopDelay } from "./src/animation/ReelAnimator.ts";
      import { CASCADE_TIMING, cascadeIntensity, cascadeLabel } from "./src/animation/CascadeAnimator.ts";

      const PhaserRef = Phaser;

      const REGULAR_SYMBOLS = ["10", "J", "Q", "K", "A", "FOOTBALL", "BOOT", "GLOVE", "TICKET", "ARMBAND", "TROPHY"];

      const els = {

        confirmDialog: document.querySelector("#confirmDialog"),
        confirmTitle: document.querySelector("#confirmTitle"),
        confirmContent: document.querySelector("#confirmContent"),
        cancelBuy: document.querySelector("#cancelBuy"),
        confirmBuy: document.querySelector("#confirmBuy"),
        toast: document.querySelector("#winToast"),
        toastTitle: document.querySelector("#toastTitle"),
        toastAmount: document.querySelector("#toastAmount"),
        confetti: document.querySelector("#confetti"),
      };

      const state = {
        balance: START_BALANCE,
        bet: 1,
        betLevels: [],
        lastWin: 0,
        spinning: false,
        turbo: false,
        auto: false,
        sound: true,
        seed: defaultSeed(),
        bonusMode: null,
        freeSpins: 0,
        persistentZones: [],
        lastVisibleZones: [],
        spinCount: 0,
        sessionStartedAt: Date.now(),
        lastRealityCheckAt: 0,
        stakeConnected: false,
        currency: "USD",
        replayMode: false,
      };

      let math = new SlotMath(state.seed, { rtp: Number(els.rtp.value), volatility: "medium-high" });
      let scene;
      let autoTimer;
      const audio = new AudioManager();
      const stakeContext = readStakeUrlContext();
      const stakeClient = createStakeSessionClient(stakeContext);

      class GoldenGoalScene extends PhaserRef.Scene {
        constructor() {
          super("GoldenGoalScene");
          this.currentGrid = makeOpeningGrid();
          this.currentZones = new Set();
          this.flashCells = new Set();
          this.revealCells = new Set();
          this.gridBounds = { x: 0, y: 0, cell: 72, gap: 8 };
          this.renderOptions = {};
        }

        create() {
          scene = this;
          this.bg = this.add.graphics();
          this.gridLayer = this.add.container(0, 0);
          this.fxLayer = this.add.container(0, 0);
          this.scale.on("resize", () => this.render());
          this.render();
        }

        setGrid(grid, zones = [], flash = [], reveals = [], options = {}) {
          this.currentGrid = grid;
          this.currentZones = new Set(zones);
          this.flashCells = new Set(flash.map(posKey));
          this.revealCells = new Set(reveals.map((reveal) => posKey(reveal.position)));
          this.renderOptions = options;
          this.render();
        }

        async pulseCells(cells) {
          this.flashCells = new Set(cells.map(posKey));
          this.render();
          this.burst(cells, 0xffd66b, state.turbo ? 12 : 18);
          this.cameras.main.shake(state.turbo ? 70 : 120, 0.0028);
          await wait(state.turbo ? 115 : 260);
          this.flashCells.clear();
          this.render();
        }

        async animateSpinToGrid(grid, zones = []) {
          this.setGrid(grid, zones, [], [], { drop: true, blur: true });
          await wait(durationFor(REEL_TIMING.reelDrop, state.turbo));
          this.setGrid(grid, zones);
        }

        async animateCascadeDrop(grid, zones = []) {
          this.setGrid(grid, zones, [], [], { drop: true, cascade: true });
          await wait(durationFor(CASCADE_TIMING.drop, state.turbo));
          this.setGrid(grid, zones);
        }

        render() {
          const width = this.scale.width;
          const height = this.scale.height;
          this.bg.clear();
          this.gridLayer.removeAll(true);
          this.fxLayer.removeAll(true);
          drawStadium(this.bg, width, height);

          const gap = Math.max(5, Math.min(10, width * 0.008));
          const safeWidth = width - 28;
          const safeHeight = height - 70;
          const cell = Math.floor(Math.min((safeWidth - gap * (COLS - 1)) / COLS, (safeHeight - gap * (ROWS - 1)) / ROWS));
          const gridWidth = cell * COLS + gap * (COLS - 1);
          const gridHeight = cell * ROWS + gap * (ROWS - 1);
          const x = (width - gridWidth) / 2;
          const y = Math.max(50, (height - gridHeight) / 2 + 12);
          this.gridBounds = { x, y, cell, gap };

          const frame = this.add.graphics();
          frame.fillStyle(0x020706, 0.72);
          frame.lineStyle(2, 0xffd66b, 0.2);
          frame.fillRoundedRect(x - 12, y - 12, gridWidth + 24, gridHeight + 24, 8);
          frame.strokeRoundedRect(x - 12, y - 12, gridWidth + 24, gridHeight + 24, 8);
          this.gridLayer.add(frame);

          for (let row = 0; row < ROWS; row += 1) {
            for (let col = 0; col < COLS; col += 1) {
              const cellData = this.currentGrid[row][col];
              const cx = x + col * (cell + gap);
              const cy = y + row * (cell + gap);
              const cellNode = drawCell(this, cellData, cx, cy, cell, {
                golden: this.currentZones.has(`${col},${row}`),
                flash: this.flashCells.has(`${col},${row}`),
                reveal: this.revealCells.has(`${col},${row}`),
                blur: this.renderOptions.blur,
              });

              if (this.renderOptions.drop) {
                const finalY = cellNode.y;
                const finalX = cellNode.x;
                const speed = state.turbo ? 0.48 : 1;
                const delay = reelStopDelay(col, state.turbo) + row * 18 * speed;
                cellNode.y = finalY - (this.scale.height * 0.34 + (ROWS - row) * cell * 0.28);
                cellNode.x = finalX + PhaserRef.Math.Between(-7, 7);
                cellNode.angle = PhaserRef.Math.Between(-3, 3);
                cellNode.alpha = 0.16;
                cellNode.scaleY = 0.72;
                this.tweens.add({
                  targets: cellNode,
                  x: finalX,
                  y: finalY,
                  angle: 0,
                  alpha: 1,
                  scaleY: 1,
                  duration: (this.renderOptions.cascade ? 250 : 430) * speed,
                  delay,
                  ease: "Back.easeOut",
                  onStart: () => {
                    if (row === 0) playSound("land");
                  },
                  onComplete: () => {
                    if (row === ROWS - 1) playSound("reel");
                  },
                });
              }

              this.gridLayer.add(cellNode);
            }
          }

          const title = this.add.text(width / 2, 20, "STADIUM NIGHT FINAL", {
            fontFamily: "Inter, Arial",
            fontSize: `${Math.max(11, Math.min(16, width / 56))}px`,
            color: "#9cffd0",
            fontStyle: "700",
          });
          title.setOrigin(0.5, 0);
          this.gridLayer.add(title);
        }

        burst(cells, color = 0xffd66b, count = 9) {
          const { x, y, cell, gap } = this.gridBounds;
          for (const position of cells) {
            const px = x + position.col * (cell + gap) + cell / 2;
            const py = y + position.row * (cell + gap) + cell / 2;
            for (let i = 0; i < count; i += 1) {
              const dot = this.add.circle(px, py, Math.max(2, cell * 0.035), color, 0.92);
              this.fxLayer.add(dot);
              this.tweens.add({
                targets: dot,
                x: px + PhaserRef.Math.Between(-cell, cell),
                y: py + PhaserRef.Math.Between(-cell, cell),
                alpha: 0,
                scale: 0.25,
                duration: state.turbo ? 180 : 360,
                ease: "Quad.easeOut",
                onComplete: () => dot.destroy(),
              });
            }
          }
        }

        spotlight(cells) {
          const { x, y, cell, gap } = this.gridBounds;
          for (const position of cells) {
            const px = x + position.col * (cell + gap) + cell / 2;
            const py = y + position.row * (cell + gap) + cell / 2;
            const ring = this.add.circle(px, py, cell * 0.18, 0xffd66b, 0);
            ring.setStrokeStyle(3, 0xffd66b, 0.9);
            this.fxLayer.add(ring);
            this.tweens.add({
              targets: ring,
              scale: 2.2,
              alpha: 0,
              duration: state.turbo ? 320 : 620,
              ease: "Quad.easeOut",
              onComplete: () => ring.destroy(),
            });
          }
        }
      }

      const game = new PhaserRef.Game({
        type: PhaserRef.AUTO,
        parent: "game-host",
        backgroundColor: "#030706",
        scale: {
          mode: PhaserRef.Scale.RESIZE,
          width: "100%",
          height: "100%",
        },
        render: {
          antialias: true,
          powerPreference: "high-performance",
        },
        scene: [GoldenGoalScene],
      });

      function toLocalCell(cell) {
        return {
          id: cell.id,
          label: cell.label ?? undefined,
          value: cell.value ?? undefined,
          coinTier: cell.coinTier ?? undefined,
        };
      }

      function toLocalGrid(board) {
        return board.map((row) => row.map(toLocalCell));
      }

      function toLocalPosition(position) {
        return { col: Number(position[0]), row: Number(position[1]) };
      }

      function mapStakeRoundToSpinResult(round, bet) {
        const events = Array.isArray(round?.events) ? round.events : [];
        if (events.length === 0) throw new Error("Stake round returned no events");

        const reveal = events.find((event) => event?.type === "reveal");
        const roundEnd = events.find((event) => event?.type === "roundEnd");
        if (!reveal || !roundEnd) {
          throw new Error("Stake round is missing reveal or roundEnd events");
        }

        const cascades = events
          .filter((event) => event?.type === "cascade")
          .map((event, index, source) => {
            const previous = index === 0 ? reveal : source[index - 1];
            return {
              index: event.cascadeIndex ?? index + 1,
              gridBefore: toLocalGrid(previous.board),
              gridAfter: toLocalGrid(event.board),
              removed: (event.removed ?? []).map(toLocalPosition),
              goldenAdded: (event.goldenAdded ?? []).map(toLocalPosition),
              clusters: (event.wins ?? []).map((win) => ({
                symbol: win.symbol,
                size: win.size,
                baseMultiplier: win.baseMultiplier,
                cascadeMultiplier: win.cascadeMultiplier,
                winMultiplier: win.winMultiplier,
                cells: (win.positions ?? []).map(toLocalPosition),
              })),
              cascadeWinMultiplier: (event.wins ?? []).reduce((sum, win) => sum + Number(win.winMultiplier ?? 0), 0),
              cascadeMultiplier: Number(event.cascadeMultiplier ?? 1),
            };
          });

        const feature = events.find((event) => event?.type === "feature");
        const totalWinMultiplier = Number(roundEnd.totalWinMultiplier ?? Number(round?.payoutMultiplier ?? 0) / 100);
        const totalWin = roundCurrency(totalWinMultiplier * bet);

        return {
          seedState: 0,
          mode: String(reveal.mode ?? round?.mode ?? STAKE_MODE_NAME),
          bet,
          initialGrid: toLocalGrid(reveal.board),
          finalGrid: toLocalGrid(roundEnd.finalBoard ?? reveal.board),
          cascades,
          goldenZones: Array.isArray(roundEnd.goldenZones)
            ? roundEnd.goldenZones
            : Array.isArray(reveal.goldenZones)
              ? reveal.goldenZones
              : [],
          activatorLanded: Boolean(reveal.activatorLanded),
          scatterCount: Number(reveal.scatterCount ?? 0),
          triggeredBonus: null,
          retriggerSpins: 0,
          goldenReveals: (feature?.reveals ?? []).map((item) => ({
            position: toLocalPosition(item.position),
            id: item.id,
            coinTier: item.coinTier ?? undefined,
            baseValue: Number(item.baseValue ?? 0),
            value: Number(item.value ?? 0),
            multiplier: item.multiplier == null ? undefined : Number(item.multiplier),
            label: item.label ?? "",
          })),
          captainEvents: (feature?.captains ?? []).map((item) => ({
            position: toLocalPosition(item.position),
            multiplier: Number(item.multiplier ?? 1),
            targets: (item.targets ?? []).map(toLocalPosition),
          })),
          collectorEvents: (feature?.collectors ?? []).map((item) => ({
            position: toLocalPosition(item.position),
            collected: Number(item.collected ?? 0),
            sources: (item.sources ?? []).map(toLocalPosition),
          })),
          clusterWinMultiplier: cascades.reduce((sum, step) => sum + Number(step.cascadeWinMultiplier ?? 0), 0),
          featureWinMultiplier: Math.max(0, totalWinMultiplier - cascades.reduce((sum, step) => sum + Number(step.cascadeWinMultiplier ?? 0), 0)),
          totalWinMultiplier,
          totalWin,
          capped: Boolean(roundEnd.capped),
        };
      }

      async function initialiseStakeSession() {
        if (!stakeClient) return;
        const auth = await stakeClient.authenticate();
        state.stakeConnected = true;
        state.currency = auth.balance?.currency ?? "USD";
        state.balance = roundCurrency(stakeUnitsToCredits(auth.balance?.amount ?? 0));
        state.betLevels = (auth.config?.betLevels ?? [])
          .map((amount) => roundCurrency(stakeUnitsToCredits(amount)))
          .filter((amount, index, source) => Number.isFinite(amount) && amount > 0 && source.indexOf(amount) === index)
          .sort((a, b) => a - b);

        const fallbackBet = roundCurrency(stakeUnitsToCredits(auth.config?.defaultBetLevel ?? auth.config?.minBet ?? creditsToStakeUnits(state.bet)));
        state.bet = state.betLevels.includes(fallbackBet) ? fallbackBet : fallbackBet || state.betLevels[0] || state.bet;
        els.rtp.disabled = true;
        els.rtp.title = "RTP is defined by the uploaded Stake math package";
        document.querySelectorAll(".buy-option[data-buy]").forEach((button) => {
          button.disabled = true;
          button.title = "Bonus buy is disabled in the current Stake-published base mode";
        });
        if (auth.config?.jurisdiction?.disabledTurbo) {
          state.turbo = false;
          els.turbo.classList.remove("active");
          els.turbo.disabled = true;
        }
        if (auth.config?.jurisdiction?.disabledFullscreen) {
          els.fullscreen.disabled = true;
        }
        if (stakeContext?.replay) {
          state.replayMode = true;
          stopAuto();
          els.auto.disabled = true;
          els.spin.textContent = "REPLAY";
        }
        setStatus("Stake session authenticated", "ready");
      }

      async function initialiseRuntime() {
        audio.setVolume(Number(els.volume.value) / 100);
        els.sound.classList.toggle("active", state.sound);
        setStatus(stakeClient ? "Connecting to Stake session" : "Ready", "ready");
        window.setInterval(updateSessionClock, 1000);

        if (stakeClient) {
          try {

      async function spin(extraRequest = {}) {
        if (state.spinning) {
          playSound("error");
          return;
        }
        if (state.replayMode) {
          setStatus("Replay mode is not implemented in this build", "error");
          playSound("error");
          return;
        }
        if (!scene) return;

        const inBonus = state.bonusMode !== null;
        const spinCost = inBonus ? 0 : state.bet;
        if (state.balance < spinCost) {
          setStatus("Demo balance is too low", "error");
          playSound("error");
          stopAuto();
          return;
        }

        state.spinning = true;
        els.spin.classList.add("is-spinning");
        state.spinCount += 1;
        if (!stakeClient) state.balance = roundCurrency(state.balance - spinCost);
        if (inBonus) state.freeSpins -= 1;
        updateUi();
        setGameState(inBonus ? "bonus" : "spinning", inBonus ? `${formatMode(state.bonusMode)} free spin` : "Spinning");
        playSound("spin");

        let result;
        try {
          if (stakeClient) {
            const playResponse = await stakeClient.play({
              amount: creditsToStakeUnits(state.bet),
              mode: STAKE_MODE_NAME,
            });
            state.balance = roundCurrency(stakeUnitsToCredits(playResponse.balance?.amount ?? 0));
            updateUi();
            result = mapStakeRoundToSpinResult(playResponse.round, state.bet);
          } else {
            result = math.spin({
              bet: state.bet,
              mode: state.bonusMode ?? "base",
              persistentGoldenZones: inBonus ? state.persistentZones : [],
              forceActivator: state.bonusMode === "worldFinal",
              ...extraRequest,
            });
          }

          await playResult(result);

          state.lastWin = result.totalWin;
          state.lastVisibleZones = result.goldenZones;

          if (stakeClient) {
            const endResponse = await stakeClient.endRound();
            state.balance = roundCurrency(stakeUnitsToCredits(endResponse.balance?.amount ?? 0));
            state.persistentZones = [];
            if (result.totalWin <= 0) setStatus("Complete", "complete");
          } else if (result.totalWin <= 0) {
            state.balance = roundCurrency(state.balance + result.totalWin);
            if (inBonus) {
              state.persistentZones = result.goldenZones;
              if (result.triggeredBonus?.upgraded) {
                state.bonusMode = "worldFinal";
                state.freeSpins = Math.max(state.freeSpins, 12);
                await showBonusTransition("World Final Bonus", "Upgrade unlocked by Whistles");
                setStatus("World Final upgrade", "bonus");
              } else if (result.retriggerSpins > 0) {
                state.freeSpins += result.retriggerSpins;
                setStatus(`Retrigger +${result.retriggerSpins} free spins`, "bonus");
              }
              if (state.freeSpins <= 0) {
                state.bonusMode = null;
                state.persistentZones = [];
                setStatus("Bonus complete", "ready");
              }
            } else {
              state.persistentZones = [];
              if (result.triggeredBonus) {
                state.bonusMode = result.triggeredBonus.mode;
                state.freeSpins = result.triggeredBonus.spins;
                state.persistentZones = result.goldenZones;
                await showBonusTransition(formatMode(result.triggeredBonus.mode), `${result.triggeredBonus.spins} free spins`);
                setStatus(`${formatMode(result.triggeredBonus.mode)} triggered`, "bonus");
              } else if (result.totalWin <= 0) {
                setStatus("Complete", "complete");
              }
            }
          }

          state.spinning = false;
          els.spin.classList.remove("is-spinning");
          if (!state.bonusMode && result.totalWin > 0) setStatus("Complete", "complete");
          updateUi();

          await maybeShowRealityCheck();

          if (state.auto && state.balance >= state.bet && !state.replayMode) {
            autoTimer = window.setTimeout(() => spin(), state.turbo ? 220 : 720);
          } else if (!state.bonusMode && result.totalWin <= 0) {
            window.setTimeout(() => {
              if (!state.spinning) setStatus("Ready", "ready");
            }, state.turbo ? 260 : 650);
          }
        } catch (error) {
          state.spinning = false;
          els.spin.classList.remove("is-spinning");
          updateUi();
          stopAuto();
          setStatus(error instanceof Error ? error.message : "Spin failed", "error");
          playSound("error");
        }
      }

      async function playResult(result) {
        let liveZones = new Set(result.mode === "base" ? [] : state.persistentZones);
        await scene.animateSpinToGrid(result.initialGrid, Array.from(liveZones));
        setGameState("evaluating", "Evaluating");
        await wait(state.turbo ? 60 : 130);

        for (const step of result.cascades) {
          scene.setGrid(step.gridBefore, Array.from(liveZones), step.removed);
          showCascadeBadge(cascadeLabel(step.index, step.cascadeMultiplier));
          scene.spotlight(step.removed);
          setGameState("cascading", `Cascading - ${cascadeLabel(step.index, step.cascadeMultiplier)}`);
          playSound("cascade");
          await scene.pulseCells(step.removed);
          for (const added of step.goldenAdded) liveZones.add(posKey(added));
          if (step.goldenAdded.length > 0) playSound("golden");
          const intensity = cascadeIntensity(step.index);
          playSound(intensity === "high" ? "crowd" : intensity === "medium" ? "hit" : "reel");
          await scene.animateCascadeDrop(step.gridAfter, Array.from(liveZones));
          await wait(state.turbo ? 55 : 130);
        }
        hideCascadeBadge();

        if (result.activatorLanded && result.goldenReveals.length > 0) {
          setGameState("feature", "Stadium Lights activate Golden Pitch Zones");
          triggerLightSweep();
          scene.cameras.main.shake(state.turbo ? 90 : 160, 0.004);
          playSound("feature");
          await wait(durationFor(GOLDEN_PITCH_TIMING.lightSweep, state.turbo));
        }

        scene.setGrid(result.finalGrid, result.goldenZones, [], result.goldenReveals);
        if (result.goldenReveals.length > 0) {
          scene.spotlight(result.goldenReveals.map((reveal) => reveal.position));
          playSound("reveal");
          await wait(state.turbo ? 160 : 360);
        }

        if (result.captainEvents.length > 0 || result.collectorEvents.length > 0) {
          playSound("collect");
          await wait(state.turbo ? 210 : 500);
        }

        if (result.totalWinMultiplier > 0) {
          await showWin(result.totalWinMultiplier, result.totalWin);
          if (result.totalWinMultiplier >= 20) {
            scene.cameras.main.shake(240, Math.min(0.012, result.totalWinMultiplier / 9000));
            launchConfetti(result.totalWinMultiplier);
          }
        }
      }

      async function buyBonus(type) {
        if (stakeClient) {
          setStatus("Bonus buy is disabled in the current Stake-published mode", "error");
          playSound("error");
          return;
        }
        if (state.spinning) {
          playSound("error");
          return;
        }
        const buy = math.bonusBuy(type, state.bet);
        if (state.balance < buy.cost) {
          setStatus("Demo balance is too low for that buy", "error");
          playSound("error");
          return;
        }

        const confirmed = await confirmBonusBuy(type, buy.cost);
        if (!confirmed) {
          setGameState("idle", "Ready");
          return;
        }

        state.balance = roundCurrency(state.balance - buy.cost);
        updateUi();
        playSound("feature");

        if (buy.startsBonus) {
          await showBonusTransition(formatMode(buy.startsBonus.mode), `${buy.startsBonus.spins} free spins ready`);
          state.bonusMode = buy.startsBonus.mode;
          state.freeSpins = buy.startsBonus.spins;
          state.persistentZones = [];
          setStatus(`${formatMode(buy.startsBonus.mode)} bought`, "bonus");
          updateUi();
          return;
        }

        await spin(buy.request ?? {});
      }

      function toggleAuto() {
        if (stakeClient || state.replayMode) {
          setStatus("Autoplay is disabled in this Stake session", "error");
          playSound("error");
          return;
        }
        playSound("button");
        state.auto = !state.auto;
        els.auto.classList.toggle("active", state.auto);

        state.auto = false;
        els.auto.classList.remove("active");
        if (autoTimer) window.clearTimeout(autoTimer);

      function setBet(value) {
        if (state.betLevels.length > 0) {
          const target = Number.isFinite(value) ? value : state.bet;
          const next = state.betLevels.reduce((closest, current) =>
            Math.abs(current - target) < Math.abs(closest - target) ? current : closest,
          state.betLevels[0]);
          state.bet = roundCurrency(next);
        } else {
          const normalized = Math.min(MAX_BET, Math.max(MIN_BET, Number.isFinite(value) ? value : state.bet));
          state.bet = roundCurrency(normalized);
        }
        updateUi();
      }

      function confirmBonusBuy(type, cost) {
        const labels = {

      function animateNumber(element, value) {
        const current = Number(element.dataset.value ?? element.textContent ?? 0);
        const target = roundCurrency(value);
        element.dataset.value = String(target);
        if (!Number.isFinite(current) || Math.abs(current - target) < 0.01) {
          element.textContent = money(target);
          return;
        }

        const start = performance.now();
        const duration = state.turbo ? 140 : 320;
        const tick = (now) => {
          const t = Math.min(1, (now - start) / duration);
          const eased = 1 - Math.pow(1 - t, 3);
          element.textContent = money(current + (target - current) * eased);
          if (t < 1) requestAnimationFrame(tick);
          else element.textContent = money(target);
        };
        requestAnimationFrame(tick);
      }

      function makeOpeningGrid() {
        return Array.from({ length: ROWS }, (_, row) =>

        );

      function drawStadium(g, width, height) {
        g.fillStyle(0x020706, 1);
        g.fillRect(0, 0, width, height);
        g.fillGradientStyle(0x184032, 0x0c2824, 0x020706, 0x010303, 0.92, 0.84, 1, 1);
        g.fillRect(0, 0, width, height);

        g.fillStyle(0x07110f, 0.72);
        for (let row = 0; row < 5; row += 1) {
          g.fillRect(0, 72 + row * 22, width, 7);
        }

        g.fillStyle(0x0d2119, 0.96);
        g.fillEllipse(width / 2, height * 0.82, width * 1.28, height * 0.44);
        g.lineStyle(2, 0x21f59b, 0.22);
        for (let i = 0; i < 6; i += 1) {
          const x = (width / 6) * i;
          g.lineBetween(x, height * 0.62, width / 2, height * 0.98);
        }
        for (let stripe = 0; stripe < 9; stripe += 1) {
          g.fillStyle(stripe % 2 ? 0x14392c : 0x0f2b23, 0.2);
          g.fillRect((width / 9) * stripe, height * 0.61, width / 9, height * 0.37);
        }
        g.lineStyle(2, 0xffffff, 0.08);
        g.strokeEllipse(width / 2, height * 0.83, width * 0.46, height * 0.12);

        for (const side of [-1, 1]) {
          const lx = width / 2 + side * width * 0.38;
          g.fillStyle(0xffffff, 0.8);
          g.fillCircle(lx, 46, 6);
          g.fillCircle(lx + side * 22, 58, 5);
          g.fillStyle(0x21f59b, 0.08);
          g.fillTriangle(lx, 48, width / 2, height * 0.46, lx + side * 150, 76);
        }
      }

      function drawCell(sceneRef, cell, x, y, size, stateFlags) {
        const box = sceneRef.add.container(x, y);
        const g = sceneRef.add.graphics();
        const isSpecial = !SYMBOL_META[cell.id]?.regular;
        const fill = stateFlags.reveal ? 0x2b1a03 : isSpecial ? 0x071d1a : 0x0b1414;
        const stroke = stateFlags.flash ? 0xffffff : stateFlags.golden ? 0xffd66b : isSpecial ? 0x21f59b : 0x31443e;
        const alpha = stateFlags.flash ? 0.94 : 0.72;

        g.fillStyle(0x000000, 0.38);
        g.fillRoundedRect(3, 5, size, size, 8);
        g.fillGradientStyle(0x20302c, fill, 0x050909, 0x020404, alpha, alpha, 0.92, 0.98);
        g.lineStyle(stateFlags.golden || stateFlags.flash ? 3 : 1.5, stroke, stateFlags.golden || stateFlags.flash ? 0.9 : 0.45);
        g.fillRoundedRect(0, 0, size, size, 8);
        g.strokeRoundedRect(0, 0, size, size, 8);
        g.lineStyle(1, 0xffffff, 0.12);
        g.strokeRoundedRect(3, 3, size - 6, size - 6, 6);
        g.fillGradientStyle(0xffffff, 0xffffff, 0xffffff, 0xffffff, 0.12, 0.02, 0, 0);
        g.fillRoundedRect(5, 5, size - 10, size * 0.34, 6);

        if (stateFlags.golden) {
          g.lineStyle(3, 0xffd66b, 0.72);
          g.strokeRoundedRect(4, 4, size - 8, size - 8, 6);
          g.lineStyle(1, 0xffffff, 0.42);
          g.strokeRoundedRect(9, 9, size - 18, size - 18, 5);
          g.fillStyle(0xffd66b, 0.46);
          for (let dot = 0; dot < 5; dot += 1) {
            g.fillCircle(10 + dot * (size - 20) / 4, 8 + ((dot * 11) % Math.max(10, size - 18)), Math.max(1.4, size * 0.018));
          }
          sceneRef.tweens.add({
            targets: box,
            alpha: { from: 0.88, to: 1 },
            duration: 520,
            yoyo: true,
            repeat: 1,
            ease: "Sine.easeInOut",
          });
        }

        box.add(g);
        drawSymbol(sceneRef, box, cell, size);
        if (stateFlags.blur) {
          const blur = sceneRef.add.graphics();
          blur.fillStyle(0xffffff, 0.08);
          blur.fillRoundedRect(size * 0.12, size * 0.1, size * 0.76, size * 0.8, 8);
          box.add(blur);
        }
        if (isSpecial && !stateFlags.reveal) {
          sceneRef.tweens.add({
            targets: box,
            scale: { from: 0.985, to: 1.018 },
            duration: 760,
            yoyo: true,
            repeat: 1,
            ease: "Sine.easeInOut",
          });
        }
        if (stateFlags.reveal) {
          box.scaleX = 0.18;
          sceneRef.tweens.add({
            targets: box,
            scaleX: 1,
            duration: state.turbo ? 150 : 280,
            ease: "Back.easeOut",
          });
        } else if (stateFlags.flash) {
          sceneRef.tweens.add({
            targets: box,
            scale: { from: 1.06, to: 1 },
            duration: state.turbo ? 120 : 220,
            ease: "Back.easeOut",
          });
        }
        box.setSize(size, size);
        box.setInteractive(new PhaserRef.Geom.Rectangle(0, 0, size, size), PhaserRef.Geom.Rectangle.Contains);
        box.on("pointerover", () => sceneRef.tweens.add({ targets: box, scale: 1.035, duration: 110, ease: "Quad.easeOut" }));
        box.on("pointerout", () => sceneRef.tweens.add({ targets: box, scale: 1, duration: 130, ease: "Quad.easeOut" }));
        return box;
      }

      function drawSymbol(sceneRef, box, cell, size) {
        const g = sceneRef.add.graphics();
        const cx = size / 2;
        const cy = size / 2;
        const scale = size / 88;
        const textSize = Math.max(13, Math.floor(size * 0.24));

        if (["10", "J", "Q", "K", "A"].includes(cell.id)) {
          const color = cell.id === "A" || cell.id === "K" ? "#ffd66b" : "#d9fff0";
          const text = sceneRef.add.text(cx, cy, cell.id, {
            fontFamily: "Georgia, serif",
            fontSize: `${Math.floor(size * 0.48)}px`,
            fontStyle: "900",
            color,
            stroke: "#2a1a04",
            strokeThickness: Math.max(2, size * 0.035),
          });
          text.setOrigin(0.5);
          text.setShadow(0, 4, "rgba(0,0,0,0.72)", 8, true, true);
          box.add(text);
          return;
        }

        if (cell.id === "FOOTBALL") {
          g.fillStyle(0xeafdf4, 1);
          g.fillCircle(cx, cy, 24 * scale);
          g.lineStyle(3 * scale, 0x081210, 0.9);
          g.strokeCircle(cx, cy, 24 * scale);
          g.lineBetween(cx - 16 * scale, cy, cx + 16 * scale, cy);
          g.lineBetween(cx, cy - 18 * scale, cx, cy + 18 * scale);
          g.strokePoints(
            [
              new PhaserRef.Geom.Point(cx, cy - 12 * scale),
              new PhaserRef.Geom.Point(cx + 11 * scale, cy),
              new PhaserRef.Geom.Point(cx, cy + 12 * scale),
              new PhaserRef.Geom.Point(cx - 11 * scale, cy),
            ],
            true,
          );
        } else if (cell.id === "BOOT") {
          g.fillStyle(0xf7bd28, 1);
          g.fillPoints(
            [
              { x: cx - 24 * scale, y: cy - 2 * scale },
              { x: cx + 4 * scale, y: cy - 16 * scale },
              { x: cx + 18 * scale, y: cy + 3 * scale },
              { x: cx + 27 * scale, y: cy + 12 * scale },
              { x: cx - 18 * scale, y: cy + 16 * scale },
            ],
            true,
          );
          g.fillStyle(0x111111, 0.8);
          g.fillRect(cx - 12 * scale, cy + 12 * scale, 38 * scale, 5 * scale);
        } else if (cell.id === "GLOVE") {
          g.fillStyle(0x4cc3ff, 1);
          for (let i = 0; i < 4; i += 1) g.fillRoundedRect(cx - 22 * scale + i * 10 * scale, cy - 24 * scale, 8 * scale, 28 * scale, 4 * scale);
          g.fillRoundedRect(cx - 22 * scale, cy - 4 * scale, 42 * scale, 28 * scale, 10 * scale);
          g.lineStyle(2 * scale, 0xffffff, 0.8);
          g.lineBetween(cx - 12 * scale, cy + 6 * scale, cx + 12 * scale, cy + 14 * scale);
        } else if (cell.id === "TICKET") {
          g.fillStyle(0xff4d66, 1);
          g.fillRoundedRect(cx - 27 * scale, cy - 18 * scale, 54 * scale, 36 * scale, 6 * scale);
          g.fillStyle(0x07100d, 1);
          g.fillCircle(cx - 27 * scale, cy, 7 * scale);
          g.fillCircle(cx + 27 * scale, cy, 7 * scale);
          g.lineStyle(2 * scale, 0xffffff, 0.55);
          g.lineBetween(cx - 10 * scale, cy - 12 * scale, cx - 10 * scale, cy + 12 * scale);
        } else if (cell.id === "ARMBAND") {
          g.fillStyle(0x21f59b, 1);
          g.fillRoundedRect(cx - 28 * scale, cy - 14 * scale, 56 * scale, 28 * scale, 6 * scale);
          g.fillStyle(0x07100d, 0.82);
          g.fillRect(cx - 6 * scale, cy - 14 * scale, 12 * scale, 28 * scale);
          addSmallLabel(sceneRef, box, "C", cx, cy, size * 0.24, "#07100d");
        } else if (cell.id === "TROPHY" || cell.id === "WILD_TROPHY") {
          drawTrophy(g, cx, cy, scale, cell.id === "WILD_TROPHY" ? 0x21f59b : 0xffd66b);
        } else if (cell.id === "LIGHTS") {
          g.fillStyle(0xf5fff9, 0.95);
          g.fillCircle(cx - 12 * scale, cy - 12 * scale, 8 * scale);
          g.fillCircle(cx + 12 * scale, cy - 12 * scale, 8 * scale);
          g.lineStyle(5 * scale, 0x21f59b, 0.7);
          g.lineBetween(cx, cy - 4 * scale, cx, cy + 24 * scale);
          g.fillStyle(0x21f59b, 0.15);
          g.fillTriangle(cx - 30 * scale, cy + 28 * scale, cx - 12 * scale, cy - 4 * scale, cx + 8 * scale, cy + 28 * scale);
          g.fillTriangle(cx + 30 * scale, cy + 28 * scale, cx + 12 * scale, cy - 4 * scale, cx - 8 * scale, cy + 28 * scale);
        } else if (cell.id === "WHISTLE") {
          g.fillStyle(0xeafdf4, 1);
          g.fillRoundedRect(cx - 22 * scale, cy - 8 * scale, 34 * scale, 20 * scale, 8 * scale);
          g.fillCircle(cx + 15 * scale, cy + 2 * scale, 13 * scale);
          g.fillStyle(0x07100d, 1);
          g.fillCircle(cx + 15 * scale, cy + 2 * scale, 5 * scale);
        } else if (cell.id === "VAR_SCREEN") {
          g.fillStyle(0x0f1c22, 1);
          g.lineStyle(3 * scale, 0x4cc3ff, 0.9);
          g.fillRoundedRect(cx - 28 * scale, cy - 20 * scale, 56 * scale, 38 * scale, 5 * scale);
          g.strokeRoundedRect(cx - 28 * scale, cy - 20 * scale, 56 * scale, 38 * scale, 5 * scale);
          addSmallLabel(sceneRef, box, "VAR", cx, cy, textSize, "#4cc3ff");
        } else if (cell.id === "GOLDEN_BALL") {
          const color = cell.coinTier === "gold" ? 0xffd66b : cell.coinTier === "silver" ? 0xdce8ef : 0xcd8755;
          g.fillStyle(color, 1);
          g.fillCircle(cx, cy - 4 * scale, 24 * scale);
          g.lineStyle(2 * scale, 0x111111, 0.45);
          g.strokeCircle(cx, cy - 4 * scale, 24 * scale);
          addSmallLabel(sceneRef, box, cell.label ?? `${cell.value ?? 0}x`, cx, cy + size * 0.27, Math.max(11, size * 0.18), "#ffffff");
        } else if (cell.id === "CAPTAIN_STAR") {
          drawStar(g, cx, cy - 3 * scale, 26 * scale, 0xffd66b);
          addSmallLabel(sceneRef, box, cell.label ?? "STAR", cx, cy + size * 0.28, Math.max(11, size * 0.18), "#ffffff");
        } else if (cell.id === "COLLECTOR") {
          drawTrophy(g, cx, cy - 5 * scale, scale * 0.86, 0xffd66b);
          addSmallLabel(sceneRef, box, cell.label ?? "COLLECT", cx, cy + size * 0.29, Math.max(10, size * 0.15), "#ffffff");
        }

        box.add(g);
        if (!["VAR_SCREEN", "GOLDEN_BALL", "CAPTAIN_STAR", "COLLECTOR", "ARMBAND"].includes(cell.id)) {
          addSmallLabel(sceneRef, box, SYMBOL_META[cell.id]?.short ?? cell.id, cx, size - 12 * scale, Math.max(9, size * 0.13), "#dffdee");
        }
      }

      function drawTrophy(g, cx, cy, scale, color) {
        g.fillStyle(color, 1);
        g.fillRoundedRect(cx - 15 * scale, cy - 22 * scale, 30 * scale, 28 * scale, 6 * scale);
        g.fillRect(cx - 6 * scale, cy + 6 * scale, 12 * scale, 18 * scale);
        g.fillRoundedRect(cx - 22 * scale, cy + 21 * scale, 44 * scale, 8 * scale, 3 * scale);
        g.lineStyle(4 * scale, color, 0.85);
        g.strokeCircle(cx - 20 * scale, cy - 8 * scale, 11 * scale);
        g.strokeCircle(cx + 20 * scale, cy - 8 * scale, 11 * scale);
        g.fillStyle(0xffffff, 0.28);
        g.fillRect(cx - 7 * scale, cy - 18 * scale, 5 * scale, 19 * scale);
      }

      function drawStar(g, cx, cy, radius, color) {
        const points = [];
        for (let i = 0; i < 10; i += 1) {
          const angle = -Math.PI / 2 + (i * Math.PI) / 5;
          const r = i % 2 === 0 ? radius : radius * 0.42;
          points.push({ x: cx + Math.cos(angle) * r, y: cy + Math.sin(angle) * r });
        }
        g.fillStyle(color, 1);
        g.fillPoints(points, true);
        g.lineStyle(2, 0xffffff, 0.55);
        g.strokePoints(points, true);
      }

      function addSmallLabel(sceneRef, box, label, x, y, size, color) {
        const text = sceneRef.add.text(x, y, label, {
          fontFamily: "Inter, Arial",
          fontSize: `${Math.floor(size)}px`,
          fontStyle: "900",
          color,
          align: "center",
        });
        text.setOrigin(0.5);
        text.setShadow(0, 2, "rgba(0,0,0,0.75)", 5, true, true);
        box.add(text);
      }

      function launchConfetti(multiplier, scale = 1) {
        const count = confettiCount(multiplier, scale);
        els.confetti.innerHTML = "";
        for (let i = 0; i < count; i += 1) {
          const piece = document.createElement("i");
          piece.style.left = `${Math.random() * 100}%`;
          piece.style.background = ["#ffd66b", "#21f59b", "#4cc3ff", "#ff4d66"][i % 4];
          piece.style.animationDelay = `${Math.random() * 180}ms`;
          piece.style.animationDuration = `${700 + Math.random() * 700}ms`;
          els.confetti.appendChild(piece);
        }
        clearElementLater(els.confetti, 1600);
      }

      function playSound(kind) {
        audio.play(kind);
      }

      function money(value) {
        return roundCurrency(value).toFixed(2);
      }

      function formatMode(mode) {
        return {
          base: "Base",
          extraTime: "Extra Time",
          penaltyShootout: "Penalty Shootout",
          worldFinal: "World Final",
        }[mode];
      }

      function posKey(position) {
        return `${position.col},${position.row}`;
      }

      function wait(ms) {
        return new Promise((resolve) => window.setTimeout(resolve, ms));
      }

      window.goldenGoalQa = {
        forceBigWin: async () => {
          document.body.dataset.qaBigWin = "showing";
          await showBigWin(getWinTier(100), 100, state.bet * 100);
          document.body.dataset.qaBigWin = "complete";
        },
        forceGoldenFeature: async () => {
          document.body.dataset.qaGoldenFeature = "revealing";
          const zones = ["1,1", "2,1", "3,2", "4,2", "2,3"];
          const grid = makeOpeningGrid();
          const reveals = zones.map((key, index) => {
            const [col, row] = key.split(",").map(Number);
            return {
              position: { col, row },
              id: "GOLDEN_BALL",
              coinTier: index > 2 ? "silver" : "bronze",
              value: index > 2 ? 10 : 2,
              label: index > 2 ? "10x" : "2x",
            };
          });
          scene.setGrid(grid, zones);
          triggerLightSweep();
          playSound("feature");
          await wait(durationFor(GOLDEN_PITCH_TIMING.lightSweep, state.turbo));
          for (const reveal of reveals) grid[reveal.position.row][reveal.position.col] = reveal;
          scene.setGrid(grid, zones, [], reveals);
          scene.spotlight(reveals.map((reveal) => reveal.position));
          playSound("reveal");
          document.body.dataset.qaGoldenFeature = "revealed";
        },
      };
      await initialiseRuntime();
      document.body.dataset.qaHook = "ready";
      if (new URLSearchParams(window.location.search).has("qa")) {
        const qaPanel = document.createElement("div");
        qaPanel.setAttribute("aria-hidden", "true");
        qaPanel.style.cssText =
          "position:fixed;right:8px;bottom:8px;z-index:9999;display:flex;gap:4px;opacity:.04;";
        qaPanel.innerHTML = `
          <button id="qaForceBigWin" type="button">QA Big Win</button>
          <button id="qaForceGoldenFeature" type="button">QA Golden Feature</button>
        `;
        document.body.appendChild(qaPanel);
        qaPanel.querySelector("#qaForceBigWin").addEventListener("click", () => window.goldenGoalQa.forceBigWin());
        qaPanel.querySelector("#qaForceGoldenFeature").addEventListener("click", () => window.goldenGoalQa.forceGoldenFeature());
      }
    </script>
  </body>
</html>
