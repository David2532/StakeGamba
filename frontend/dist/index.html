<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Golden Goal Rush Prototype</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #07100d;
        --panel: rgba(8, 15, 14, 0.78);
        --panel-strong: rgba(5, 9, 10, 0.92);
        --line: rgba(255, 255, 255, 0.12);
        --gold: #ffd66b;
        --gold-strong: #ffb72c;
        --green: #21f59b;
        --green-soft: rgba(33, 245, 155, 0.22);
        --red: #ff4d66;
        --blue: #4cc3ff;
        --text: #f7fff8;
        --muted: #96aaa2;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        min-height: 100dvh;
        overflow: hidden;
        overflow-x: hidden;
        background:
          radial-gradient(circle at 50% 0%, rgba(255, 214, 107, 0.15), transparent 34%),
          linear-gradient(180deg, rgba(13, 28, 23, 0.88), rgba(4, 8, 9, 0.98)),
          var(--bg);
        color: var(--text);
      }

      body::before {
        content: "";
        position: fixed;
        inset: 0;
        pointer-events: none;
        background:
          linear-gradient(90deg, transparent 0 8%, rgba(33, 245, 155, 0.08) 8.3% 8.8%, transparent 9.2%),
          repeating-linear-gradient(90deg, rgba(255, 255, 255, 0.035) 0 1px, transparent 1px 72px);
        mask-image: linear-gradient(180deg, transparent, #000 18%, #000 76%, transparent);
        opacity: 0.55;
      }

      button,
      select,
      input {
        font: inherit;
      }

      button {
        border: 0;
        color: var(--text);
        cursor: pointer;
      }

      button:disabled {
        cursor: wait;
        opacity: 0.56;
      }

      .app {
        position: relative;
        display: grid;
        grid-template-rows: auto 1fr;
        width: 100%;
        max-width: 100dvw;
        height: 100vh;
        height: 100dvh;
        padding: 14px;
        gap: 12px;
      }

      .topbar {
        display: grid;
        grid-template-columns: 1fr auto;
        align-items: center;
        gap: 12px;
        min-height: 58px;
        padding: 10px 14px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: linear-gradient(180deg, rgba(11, 22, 20, 0.92), rgba(4, 7, 8, 0.82));
        box-shadow: 0 16px 44px rgba(0, 0, 0, 0.35);
      }

      .brand {
        display: flex;
        align-items: center;
        gap: 12px;
        min-width: 0;
      }

      .crest {
        display: grid;
        place-items: center;
        flex: 0 0 38px;
        width: 38px;
        height: 38px;
        border: 1px solid rgba(255, 214, 107, 0.55);
        border-radius: 8px;
        background: radial-gradient(circle at 50% 35%, #fff1a9, #e6a81f 48%, #6b4507 100%);
        color: #111;
        font-weight: 1000;
        letter-spacing: 0;
      }

      h1 {
        margin: 0;
        font-size: clamp(20px, 3vw, 34px);
        line-height: 1;
        letter-spacing: 0;
      }

      .subline {
        margin-top: 5px;
        color: var(--muted);
        font-size: 12px;
        letter-spacing: 0;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .header-actions {
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .icon-btn {
        display: grid;
        place-items: center;
        width: 38px;
        height: 38px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.06);
        font-weight: 900;
      }

      .layout {
        display: grid;
        grid-template-columns: minmax(0, 1fr) 330px;
        gap: 12px;
        min-height: 0;
      }

      .stage {
        position: relative;
        grid-column: 1;
        min-width: 0;
        min-height: 0;
        overflow: hidden;
        border: 1px solid var(--line);
        border-radius: 8px;
        background:
          radial-gradient(circle at 50% 0%, rgba(33, 245, 155, 0.12), transparent 36%),
          linear-gradient(180deg, rgba(4, 13, 13, 0.96), rgba(1, 3, 5, 0.92));
        box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.06), 0 24px 70px rgba(0, 0, 0, 0.42);
      }

      #game-host {
        width: 100%;
        height: 100%;
      }

      .win-toast {
        position: absolute;
        left: 50%;
        top: 11%;
        z-index: 4;
        transform: translate(-50%, -20px) scale(0.94);
        min-width: min(520px, calc(100% - 32px));
        padding: 14px 22px;
        border: 1px solid rgba(255, 214, 107, 0.58);
        border-radius: 8px;
        background: rgba(8, 9, 8, 0.82);
        box-shadow: 0 0 50px rgba(255, 183, 44, 0.26);
        text-align: center;
        opacity: 0;
        pointer-events: none;
        transition:
          opacity 160ms ease,
          transform 160ms ease;
      }

      .win-toast.show {
        opacity: 1;
        transform: translate(-50%, 0) scale(1);
      }

      .win-toast strong {
        display: block;
        color: var(--gold);
        font-size: clamp(22px, 4vw, 44px);
        line-height: 1;
        letter-spacing: 0;
        text-shadow: 0 0 24px rgba(255, 214, 107, 0.46);
      }

      .win-toast span {
        display: block;
        margin-top: 8px;
        color: #d8f8ea;
        font-size: 14px;
      }

      .side-panel {
        grid-column: 2;
        display: flex;
        flex-direction: column;
        min-height: 0;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--panel);
        backdrop-filter: blur(16px);
        overflow: hidden;
      }

      .meters {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 8px;
        padding: 12px;
        border-bottom: 1px solid var(--line);
      }

      .meter {
        min-width: 0;
        padding: 10px;
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.045);
      }

      .meter label {
        display: block;
        color: var(--muted);
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 0;
      }

      .meter strong {
        display: block;
        margin-top: 4px;
        font-size: 20px;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .meter.full {
        grid-column: 1 / -1;
      }

      .controls {
        display: grid;
        gap: 10px;
        padding: 12px;
      }

      .field {
        display: grid;
        gap: 6px;
      }

      .field label {
        color: var(--muted);
        font-size: 12px;
        text-transform: uppercase;
        letter-spacing: 0;
      }

      .stepper {
        display: grid;
        grid-template-columns: 42px 1fr 42px;
        gap: 8px;
      }

      .stepper input,
      select {
        width: 100%;
        min-height: 42px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: rgba(0, 0, 0, 0.34);
        color: var(--text);
        text-align: center;
        outline: none;
      }

      .stepper button,
      .secondary,
      .toggle {
        min-height: 42px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.06);
      }

      .primary-spin {
        min-height: 74px;
        border-radius: 8px;
        background: radial-gradient(circle at 50% 20%, #fff8bf, var(--gold-strong) 42%, #895808 100%);
        color: #130f04;
        font-size: 24px;
        font-weight: 1000;
        letter-spacing: 0;
        box-shadow: 0 0 38px rgba(255, 183, 44, 0.24);
      }

      .quick-row,
      .modal-row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 8px;
      }

      .toggle.active {
        border-color: rgba(33, 245, 155, 0.75);
        background: var(--green-soft);
        color: #dffff1;
      }

      .buy-panel {
        display: grid;
        gap: 8px;
        padding: 12px;
        border-top: 1px solid var(--line);
        overflow: auto;
      }

      .buy-panel h2 {
        margin: 0 0 2px;
        font-size: 14px;
        text-transform: uppercase;
        letter-spacing: 0;
      }

      .buy-option {
        display: grid;
        grid-template-columns: 1fr auto;
        align-items: center;
        gap: 8px;
        width: 100%;
        padding: 10px;
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 8px;
        background: rgba(0, 0, 0, 0.22);
        text-align: left;
      }

      .buy-option span {
        color: var(--muted);
        font-size: 12px;
      }

      .buy-option b {
        color: var(--gold);
      }

      dialog {
        width: min(760px, calc(100dvw - 24px));
        max-height: min(760px, calc(100dvh - 24px));
        border: 1px solid rgba(255, 214, 107, 0.34);
        border-radius: 8px;
        background: var(--panel-strong);
        color: var(--text);
        box-shadow: 0 24px 80px rgba(0, 0, 0, 0.7);
      }

      dialog::backdrop {
        background: rgba(0, 0, 0, 0.62);
        backdrop-filter: blur(5px);
      }

      .dialog-body {
        display: grid;
        gap: 14px;
        padding: 18px;
      }

      .dialog-body h2 {
        margin: 0;
      }

      .dialog-body p,
      .dialog-body li {
        color: #c7d8d2;
        line-height: 1.45;
      }

      .pay-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
        gap: 8px;
      }

      .pay-card {
        padding: 10px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.04);
      }

      .pay-card b {
        display: block;
        color: var(--gold);
      }

      .confetti {
        position: fixed;
        inset: 0;
        pointer-events: none;
        overflow: hidden;
        z-index: 8;
      }

      .confetti i {
        position: absolute;
        top: -18px;
        width: 8px;
        height: 14px;
        border-radius: 2px;
        animation: fall 900ms linear forwards;
      }

      @keyframes fall {
        to {
          transform: translateY(110dvh) rotate(520deg);
          opacity: 0;
        }
      }

      @media (max-width: 900px) {
        body {
          overflow: auto;
          overflow-x: hidden;
        }

        .app {
          min-height: 100vh;
          min-height: 100dvh;
          height: auto;
          padding: 8px;
        }

        .topbar {
          grid-template-columns: 1fr;
        }

        .header-actions {
          justify-content: space-between;
        }

        .layout {
          grid-template-columns: 1fr;
          grid-template-rows: minmax(460px, 62vh) auto;
        }

        .stage,
        .side-panel {
          grid-column: 1;
        }

        .stage {
          grid-row: 1;
        }

        .side-panel {
          grid-row: 2;
          min-height: auto;
        }

        .buy-panel {
          max-height: none;
        }
      }

      @media (max-width: 520px) {
        .app {
          gap: 8px;
        }

        .topbar {
          padding: 10px;
        }

        .layout {
          grid-template-rows: minmax(410px, 58vh) auto;
        }

        .meters {
          grid-template-columns: 1fr 1fr;
          padding: 8px;
        }

        .controls,
        .buy-panel {
          padding: 8px;
        }

        .primary-spin {
          min-height: 64px;
        }
      }

      .stage::before,
      .stage::after {
        content: "";
        position: absolute;
        inset: 0;
        pointer-events: none;
        z-index: 1;
      }

      .stage::before {
        background:
          conic-gradient(from 212deg at 10% 8%, rgba(255, 255, 255, 0.24), transparent 11%, transparent 100%),
          conic-gradient(from 148deg at 90% 8%, rgba(255, 255, 255, 0.22), transparent 12%, transparent 100%),
          linear-gradient(90deg, transparent, rgba(33, 245, 155, 0.08), transparent);
        mix-blend-mode: screen;
        opacity: 0.58;
        animation: stadiumSweep 7.5s ease-in-out infinite alternate;
      }

      .stage::after {
        background:
          radial-gradient(circle at 18% 20%, rgba(255, 214, 107, 0.2), transparent 4%),
          radial-gradient(circle at 72% 16%, rgba(33, 245, 155, 0.16), transparent 5%),
          repeating-linear-gradient(180deg, transparent 0 46px, rgba(255, 214, 107, 0.06) 47px 49px, transparent 50px);
        opacity: 0.42;
        animation: ledPulse 2.8s ease-in-out infinite;
      }

      #game-host {
        position: relative;
        z-index: 2;
      }

      .topbar,
      .side-panel,
      .stage {
        border-color: rgba(255, 214, 107, 0.18);
        box-shadow:
          inset 0 1px 0 rgba(255, 255, 255, 0.08),
          0 22px 80px rgba(0, 0, 0, 0.54),
          0 0 34px rgba(33, 245, 155, 0.06);
      }

      .topbar {
        background:
          linear-gradient(180deg, rgba(17, 31, 28, 0.9), rgba(3, 7, 8, 0.86)),
          linear-gradient(90deg, rgba(255, 214, 107, 0.1), transparent 38%, rgba(33, 245, 155, 0.08));
      }

      h1 {
        color: #fff9d8;
        text-shadow: 0 0 22px rgba(255, 214, 107, 0.28), 0 2px 0 #2a1c05;
      }

      .side-panel {
        background:
          linear-gradient(180deg, rgba(13, 24, 22, 0.82), rgba(3, 8, 9, 0.94)),
          radial-gradient(circle at 50% 0%, rgba(255, 214, 107, 0.14), transparent 36%);
      }

      .meter {
        position: relative;
        overflow: hidden;
        background:
          linear-gradient(180deg, rgba(255, 255, 255, 0.07), rgba(255, 255, 255, 0.025)),
          radial-gradient(circle at 100% 0%, rgba(33, 245, 155, 0.1), transparent 38%);
        transition: transform 150ms ease, border-color 150ms ease, box-shadow 150ms ease;
      }

      .meter::before {
        content: "";
        position: absolute;
        inset: 0;
        background: linear-gradient(110deg, transparent 0 34%, rgba(255, 255, 255, 0.07) 46%, transparent 60%);
        transform: translateX(-110%);
        animation: panelSheen 6s ease-in-out infinite;
      }

      .meter label::before {
        display: inline-block;
        width: 18px;
        margin-right: 4px;
        color: var(--gold);
      }

      .meter:nth-child(1) label::before {
        content: "$";
      }

      .meter:nth-child(2) label::before {
        content: "*";
      }

      .meter:nth-child(3) label::before {
        content: "x";
      }

      .meter:nth-child(4) label::before {
        content: ">";
      }

      .meter.full label::before {
        content: ".";
      }

      #statusValue[data-state="ready"] {
        color: var(--green);
      }

      #statusValue[data-state="spinning"] {
        color: var(--gold);
      }

      #statusValue[data-state="bonus"] {
        color: #ffe9a6;
        text-shadow: 0 0 18px rgba(255, 214, 107, 0.36);
      }

      #statusValue[data-state="complete"] {
        color: #e9fff5;
      }

      #statusValue[data-state="error"] {
        color: var(--red);
      }

      .primary-spin {
        position: relative;
        overflow: hidden;
        border: 1px solid rgba(255, 244, 186, 0.42);
        background:
          radial-gradient(circle at 50% 18%, #fff6c3 0 12%, #ffd66b 35%, #e28d15 68%, #663905 100%);
        text-shadow: 0 1px 0 rgba(255, 255, 255, 0.42);
        transition: transform 120ms ease, filter 150ms ease, box-shadow 150ms ease;
        animation: spinReadyPulse 1.7s ease-in-out infinite;
      }

      .primary-spin::before {
        content: "";
        position: absolute;
        inset: -40%;
        background: conic-gradient(from 0deg, transparent, rgba(255, 255, 255, 0.32), transparent 32%);
        animation: buttonSweep 2.5s linear infinite;
      }

      .primary-spin:hover {
        filter: brightness(1.08);
        box-shadow: 0 0 44px rgba(255, 183, 44, 0.36), 0 12px 34px rgba(0, 0, 0, 0.38);
      }

      .primary-spin:active {
        transform: scale(0.98);
      }

      .primary-spin.is-spinning {
        animation: spinLoading 0.8s linear infinite;
        color: rgba(19, 15, 4, 0.74);
      }

      .buy-option {
        position: relative;
        overflow: hidden;
        min-height: 66px;
        border-color: rgba(255, 214, 107, 0.12);
        background:
          linear-gradient(180deg, rgba(255, 255, 255, 0.055), rgba(255, 255, 255, 0.018)),
          radial-gradient(circle at 0% 0%, rgba(33, 245, 155, 0.1), transparent 42%);
        transition: transform 150ms ease, border-color 150ms ease, box-shadow 150ms ease, background 150ms ease;
      }

      .buy-option::after {
        content: "";
        position: absolute;
        inset: 0;
        background: linear-gradient(100deg, transparent 20%, rgba(255, 214, 107, 0.08), transparent 72%);
        transform: translateX(-120%);
        transition: transform 320ms ease;
      }

      .buy-option:not(:disabled):hover {
        transform: translateY(-1px);
        border-color: rgba(255, 214, 107, 0.44);
        box-shadow: 0 10px 28px rgba(0, 0, 0, 0.32), 0 0 24px rgba(33, 245, 155, 0.08);
      }

      .buy-option:not(:disabled):hover::after {
        transform: translateX(90%);
      }

      .buy-option.locked {
        border-color: rgba(255, 214, 107, 0.26);
        background:
          linear-gradient(180deg, rgba(64, 46, 9, 0.42), rgba(10, 9, 7, 0.32)),
          repeating-linear-gradient(135deg, rgba(255, 214, 107, 0.06) 0 8px, transparent 8px 16px);
      }

      input[type="range"] {
        width: 100%;
        accent-color: var(--gold);
        height: 6px;
        border-radius: 999px;
        background: linear-gradient(90deg, var(--gold), rgba(255, 255, 255, 0.18));
      }

      input[type="range"]::-webkit-slider-thumb {
        width: 18px;
        height: 18px;
        border: 2px solid #fff5c4;
        border-radius: 50%;
        background: var(--gold);
        box-shadow: 0 0 18px rgba(245, 200, 75, 0.42);
        appearance: none;
      }

      select {
        appearance: none;
        background:
          linear-gradient(45deg, transparent 50%, var(--gold) 50%) calc(100% - 18px) 52% / 7px 7px no-repeat,
          linear-gradient(135deg, var(--gold) 50%, transparent 50%) calc(100% - 13px) 52% / 7px 7px no-repeat,
          rgba(0, 0, 0, 0.34);
        padding: 0 34px 0 12px;
      }

      .cascade-badge {
        position: absolute;
        left: 50%;
        top: 78px;
        z-index: 5;
        transform: translate(-50%, -12px) scale(0.92);
        padding: 8px 16px;
        border: 1px solid rgba(33, 245, 155, 0.52);
        border-radius: 999px;
        background: rgba(4, 10, 9, 0.84);
        color: #ceffe8;
        font-weight: 900;
        letter-spacing: 0;
        opacity: 0;
        pointer-events: none;
        box-shadow: 0 0 28px rgba(33, 245, 155, 0.22);
        transition: opacity 160ms ease, transform 160ms ease;
      }

      .cascade-badge.show {
        opacity: 1;
        transform: translate(-50%, 0) scale(1);
      }

      .big-win-overlay,
      .bonus-transition {
        position: fixed;
        inset: 0;
        z-index: 20;
        display: grid;
        place-items: center;
        padding: 24px;
        background:
          radial-gradient(circle at 50% 38%, rgba(255, 214, 107, 0.2), transparent 30%),
          rgba(0, 0, 0, 0.66);
        opacity: 0;
        pointer-events: none;
        transition: opacity 180ms ease;
      }

      .big-win-overlay.show,
      .bonus-transition.show {
        opacity: 1;
        pointer-events: auto;
      }

      .big-win-card,
      .bonus-card {
        width: min(680px, 92vw);
        border: 1px solid rgba(255, 214, 107, 0.5);
        border-radius: 8px;
        padding: clamp(22px, 5vw, 46px);
        background:
          linear-gradient(180deg, rgba(19, 20, 13, 0.92), rgba(4, 7, 7, 0.96)),
          radial-gradient(circle at 50% 0%, rgba(255, 214, 107, 0.24), transparent 40%);
        box-shadow: 0 0 70px rgba(255, 183, 44, 0.22), 0 34px 90px rgba(0, 0, 0, 0.72);
        text-align: center;
      }

      .big-win-title,
      .bonus-title {
        margin: 0;
        color: var(--gold);
        font-size: clamp(34px, 9vw, 82px);
        line-height: 0.95;
        letter-spacing: 0;
        text-shadow: 0 0 26px rgba(255, 214, 107, 0.42), 0 4px 0 #442904;
      }

      .big-win-amount {
        margin-top: 16px;
        color: #ffffff;
        font-size: clamp(26px, 6vw, 54px);
        font-weight: 1000;
        text-shadow: 0 0 20px rgba(33, 245, 155, 0.32);
      }

      .big-win-sub,
      .bonus-sub {
        margin-top: 12px;
        color: #c9f5e3;
      }

      .big-win-bar {
        height: 6px;
        margin-top: 22px;
        overflow: hidden;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.1);
      }

      .big-win-bar span {
        display: block;
        width: 0%;
        height: 100%;
        background: linear-gradient(90deg, var(--green), var(--gold));
        box-shadow: 0 0 18px rgba(255, 214, 107, 0.5);
      }

      .light-sweep {
        position: absolute;
        inset: 0;
        z-index: 6;
        pointer-events: none;
        background: linear-gradient(100deg, transparent 0 36%, rgba(255, 255, 255, 0.46) 48%, rgba(255, 214, 107, 0.34) 52%, transparent 66%);
        transform: translateX(-120%);
        opacity: 0;
      }

      .light-sweep.show {
        animation: gridLightSweep 720ms ease-out forwards;
      }

      @keyframes stadiumSweep {
        from {
          transform: translateX(-1%) scale(1);
          opacity: 0.44;
        }
        to {
          transform: translateX(1%) scale(1.02);
          opacity: 0.72;
        }
      }

      @keyframes ledPulse {
        50% {
          opacity: 0.64;
        }
      }

      @keyframes panelSheen {
        0%,
        68% {
          transform: translateX(-120%);
        }
        100% {
          transform: translateX(130%);
        }
      }

      @keyframes spinReadyPulse {
        50% {
          box-shadow: 0 0 42px rgba(255, 183, 44, 0.32);
        }
      }

      @keyframes buttonSweep {
        to {
          transform: rotate(360deg);
        }
      }

      @keyframes spinLoading {
        to {
          filter: hue-rotate(18deg) brightness(1.08);
        }
      }
