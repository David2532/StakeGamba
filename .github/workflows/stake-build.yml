name: Build Stake Frontend

# Auto-builds the Stake-ready frontend on every push that touches frontend
# source, then commits the regenerated artifacts (stake-front/, frontend/dist/)
# back to the same branch. No manual `npm run build` needed anymore.
#
# Loop protection (three layers):
#   1. `paths:` only watches SOURCE files, never the generated artifacts.
#   2. Pushes made with GITHUB_TOKEN do not re-trigger workflows by design.
#   3. The auto-commit message carries [skip ci].

on:
  push:
    paths:
      - "frontend/index.html"
      - "frontend/src/**"
      - "frontend/package.json"
      - "frontend/package-lock.json"
      - "frontend/scripts/**"
      - "frontend/vite.config.ts"
      - ".github/workflows/stake-build.yml"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: stake-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build Stake frontend
        working-directory: frontend
        run: npm run build

      - name: Commit refreshed build artifacts
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add frontend/dist stake-front
          if git diff --cached --quiet; then
            echo "Build output already up to date — nothing to commit."
          else
            git commit -m "chore(build): auto-build Stake frontend [skip ci]"
            git push origin HEAD:${{ github.ref_name }}
          fi
